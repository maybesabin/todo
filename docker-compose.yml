version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend

    container_name: backend

    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

    environment:
      MONGO_URI: mongodb+srv://sawham987:Ur76G9uZWFRKnBxk@cluster0.ivgzg75.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0

  frontend:
    build: ./frontend

    container_name: frontend

    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo-data:
